services:
  openclaw-init:
    image: alpine:latest          # ← alpine, pas le build (plus léger et fiable)
    user: "0:0"
    volumes:
      - openclaw_config:/home/node/.openclaw
      - openclaw_workspace:/home/node/.openclaw/workspace
    command: >
      sh -c "chown -R 1000:1000 /home/node/.openclaw &&
             chmod -R 755 /home/node/.openclaw &&
             echo 'Permissions OK'"
    restart: "no"

  openclaw-gateway:
    build: .
    user: "1000:1000"
    expose:
      - "18789"
    depends_on:
      openclaw-init:
        condition: service_completed_successfully
    environment:
      HOME: /home/node
      TERM: xterm-256color
      TZ: Europe/Paris
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      OPENCLAW_ALLOW_INSECURE_PRIVATE_WS: "false"
      OPENCLAW_GATEWAY_BIND: lan        # ← loopback → lan pour Traefik
      OPENCLAW_SANDBOX_ENABLED: "false"
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    volumes:
      - openclaw_config:/home/node/.openclaw
      - openclaw_workspace:/home/node/.openclaw/workspace
    init: true
    restart: unless-stopped
    command:
      - node
      - dist/index.js
      - gateway
      - --bind
      - lan                             # ← loopback → lan
      - --port
      - "18789"
      - --allow-unconfigured
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:18789/healthz').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  openclaw-cli:
    build: .
    user: "1000:1000"
    network_mode: "service:openclaw-gateway"
    cap_drop:
      - NET_RAW
      - NET_ADMIN
    security_opt:
      - no-new-privileges:true
    environment:
      HOME: /home/node
      TERM: xterm-256color
      TZ: Europe/Paris
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      OPENCLAW_ALLOW_INSECURE_PRIVATE_WS: "false"
      BROWSER: echo
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    volumes:
      - openclaw_config:/home/node/.openclaw
      - openclaw_workspace:/home/node/.openclaw/workspace
    stdin_open: true
    tty: true
    init: true
    entrypoint: ["node", "dist/index.js"]
    depends_on:
      - openclaw-gateway

volumes:
  openclaw_config:
  openclaw_workspace:
