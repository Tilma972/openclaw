services:
  openclaw-init:
    image: ghcr.io/openclaw/openclaw:latest
    user: "0:0"
    volumes:
      - openclaw_config:/home/node/.openclaw
      - openclaw_workspace:/home/node/.openclaw/workspace
    command: >
      sh -c "chown -R 1000:1000 /home/node/.openclaw &&
             chmod -R 755 /home/node/.openclaw &&
             echo 'Permissions OK'"
    restart: "no"

  openclaw-gateway:
    build: .
    image: ghcr.io/openclaw/openclaw:latest
    user: "1000:1000"
    expose:
      - "18789"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.openclaw.rule=Host(`openclaw.dsolution-ia.fr`)"
      - "traefik.http.routers.openclaw.entrypoints=https"
      - "traefik.http.routers.openclaw.tls=true"
      - "traefik.http.routers.openclaw.tls.certresolver=letsencrypt"
      - "traefik.http.services.openclaw.loadbalancer.server.port=18789"
    depends_on:
      openclaw-init:
        condition: service_completed_successfully
    environment:
      HOME: /home/node
      TERM: xterm-256color
      TZ: Europe/Paris
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      OPENCLAW_ALLOW_INSECURE_PRIVATE_WS: "false"
      OPENCLAW_GATEWAY_BIND: lan
      OPENCLAW_SANDBOX_ENABLED: "false"
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    volumes:
      - openclaw_config:/home/node/.openclaw
      - openclaw_workspace:/home/node/.openclaw/workspace
    init: true
    restart: unless-stopped
    command:
      - node
      - dist/index.js
      - gateway
      - --bind
      - lan
      - --port
      - "18789"
      - --token
      - "${OPENCLAW_GATEWAY_TOKEN}"
      - --allow-unconfigured
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:18789/healthz').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

volumes:
  openclaw_config:
  openclaw_workspace:
